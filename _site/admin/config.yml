backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "studies"
    label: "Nos Études"
    folder: "data/studies"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Convention", name: "convention", widget: "select", options: ["brs", "minamata", "ccnucc", "saicm", "cirgl"]}
      - {label: "Année", name: "year", widget: "string"}
      - {label: "Auteurs", name: "authors", widget: "string"}
      - {label: "Statut", name: "status", widget: "select", options: ["published", "progress", "upcoming"]}
      - {label: "Description", name: "desc", widget: "text"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Fichier PDF", name: "pdf", widget: "file", required: false}

  - name: "actions"
    label: "Nos Actions"
    folder: "data/actions"
    create: true
    slug: "{{title}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Type", name: "type", widget: "select", options: ["action", "campagne", "temoignage"]}
      - {label: "Date", name: "date", widget: "string"}
      - {label: "Lieu", name: "location", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Contenu", name: "body", widget: "markdown"}
