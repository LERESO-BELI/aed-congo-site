<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée (404) — AED Congo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:         #2d5016;
            --primary-dark:    #1e3a0e;
            --secondary:       #6b9e3e;
            --text-primary:    #1a2410;
            --text-secondary:  #4a5e30;
            --bg-light:        #f4f7ef;
            --white:           #ffffff;
            --border:          #d6e4c0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 0 24px;
        }
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }
        .logo-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }
        .logo-image img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text h1 {
            font-family: 'Lora', serif;
            font-size: 1.25rem;
            color: var(--primary);
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }
        .error-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 15vw, 8rem);
            color: var(--primary);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-content h2 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            margin-bottom: 24px;
        }
        .error-content p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 40px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover { background: var(--primary-dark); }
        footer {
            background: var(--primary-dark);
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        footer p { opacity: 0.8; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">
                <div class="logo-image">
                    <img src="images/logo.png" alt="AED Congo Logo" onerror="this.src='images/logo-placeholder.png'">
                </div>
                <div class="logo-text">
                    <h1>AED Congo</h1>
                </div>
            </a>
        </div>
    </header>

    <main>
        <div class="error-content">
            <h1>404</h1>
            <h2>Oups ! Page introuvable</h2>
            <p>La page que vous recherchez semble avoir été déplacée, supprimée ou n'a jamais existé.</p>
            <a href="/" class="btn">Retour à l'accueil</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; <span id="year"></span> AED Congo — Action pour l'Environnement et le Développement. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
