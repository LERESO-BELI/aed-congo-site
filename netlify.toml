[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"
  ELEVENTY_ENV  = "production"

[context.deploy-preview]
  command = "npm run build"

[context.deploy-preview.environment]
  ELEVENTY_ENV = "preview"

[context.branch-deploy]
  command = "npm run build"

[context.branch-deploy.environment]
  ELEVENTY_ENV = "preview"

# Admin CMS — On redirige sans forcer si le slash est déjà présent
[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301

# Canonicalisation des URLs (SEO anti duplicate-content)
[[redirects]]
  from   = "/etudes"
  to     = "/etudes/"
  status = 301

[[redirects]]
  from   = "/actions"
  to     = "/actions/"
  status = 301

[[redirects]]
  from   = "/nous-soutenir"
  to     = "/nous-soutenir/"
  status = 301

# Fallback 404 — toujours en dernier
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Cache long pour les assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemap : revalidation toutes les heures
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# En-têtes de sécurité — toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = '''
      default-src 'self';
      script-src  'self' 'unsafe-inline'
                  https://js.stripe.com
                  https://www.paypalobjects.com
                  https://www.paypal.com
                  https://api.web3forms.com;
      style-src   'self' 'unsafe-inline'
                  https://fonts.googleapis.com;
      font-src    'self'
                  https://fonts.gstatic.com;
      img-src     'self' data:
                  https://www.paypalobjects.com;
      connect-src 'self'
                  https://api.web3forms.com
                  https://api.stripe.com;
      frame-src   https://js.stripe.com
                  https://www.paypal.com
                  https://hooks.stripe.com;
      object-src  'none';
      base-uri    'self';
      form-action 'self'
                  https://api.web3forms.com;
    '''
