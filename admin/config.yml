backend:
  name: github
  repo: LERESO-BELI/aed-congo-site
  branch: main
  base_url: https://aed-congo-site-oauth.lerebonsolidaire.workers.dev
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

# Permet d'avoir une interface en français pour les membres
locale: 'fr'

collections:
  # 1. GESTION DES PAGES UNIQUES (Accueil, Soutien, etc.)
  - name: "pages"
    label: "Pages Statiques"
    delete: false
    create: false
    files:
      - label: "Page d'accueil"
        name: "index"
        file: "content/pages/index.njk"
        fields:
          - {label: "Titre SEO", name: "title", widget: "string", hint: "Titre dans Google (max 60 car.)"}
          - {label: "Description SEO", name: "description", widget: "text", hint: "Résumé sous le lien Google"}
          - label: "Section À propos"
            name: "presentation"
            widget: "object"
            fields:
              - {label: "Titre de section", name: "title", widget: "string"}
              - {label: "Paragraphe 1", name: "text1", widget: "text"}
              - {label: "Paragraphe 2", name: "text2", widget: "text"}
              - {label: "Nom du signataire", name: "signature_name", widget: "string"}
              - {label: "Poste du signataire", name: "signature_role", widget: "string"}

      - label: "Page Nous Soutenir"
        name: "soutenir"
        file: "content/pages/nous-soutenir.njk"
        fields:
          - {label: "Titre SEO", name: "title", widget: "string"}
          - {label: "Impact Don Ponctuel", name: "impact_p", widget: "string", hint: "Ex: Avec 50€, vous financez..."}
          - {label: "Impact Don Mensuel", name: "impact_m", widget: "string", hint: "Ex: Avec 10€/mois, vous permettez..."}

  # 2. GESTION DES FICHES DYNAMIQUES (Études)
  - name: "studies"
    label: "Catalogue des Études"
    folder: "content/studies"
    create: true
    slug: "{{year}}-{{title}}"
    fields:
      - {label: "Titre de l'étude", name: "title", widget: "string"}
      - {label: "Convention", name: "convention", widget: "select", options: ["brs", "minamata", "ccnucc", "saicm", "cirgl"]}
      - {label: "Année", name: "year", widget: "string"}
      - {label: "Auteurs", name: "authors", widget: "string"}
      - {label: "Statut", name: "status", widget: "select", options: [{label: "Publié", value: "published"}, {label: "En cours", value: "progress"}]}
      - {label: "Résumé court", name: "desc", widget: "text"}
      - {label: "Fichier PDF", name: "pdf", widget: "file", required: false}

  # 3. GESTION DES ACTIONS ET TÉMOIGNAGES
  - name: "actions"
    label: "Actions & Témoignages"
    folder: "content/actions"
    create: true
    slug: "{{type}}-{{title}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Catégorie", name: "type", widget: "select", options: ["action", "campagne", "temoignage"]}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false}
      - {label: "Lieu", name: "location", widget: "string", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Résultat / Impact", name: "impact", widget: "string", required: false}
      - {label: "Nom (si témoignage)", name: "author", widget: "string", required: false}
      - {label: "Contenu / Récit", name: "body", widget: "markdown"}

  # 4. GESTION DES PAGES JURIDIQUES
  - name: "legal"
    label: "Pages Légales"
    folder: "content/pages"
    filter: {field: "layout", value: "layouts/legal.njk"}
    create: false
    delete: false
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Texte de la page", name: "body", widget: "markdown"}
