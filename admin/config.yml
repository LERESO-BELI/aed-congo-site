    1 backend:
    2   name: git-gateway
    3   branch: main
    4
    5 media_folder: "images"
    6 public_folder: "/images"
    7
    8 # Permet d'avoir une interface en français pour les membres
    9 locale: 'fr'
   10
   11 collections:
   12   # 1. GESTION DES PAGES UNIQUES (Accueil, Soutien, etc.)
   13   - name: "pages"
   14     label: "Pages Statiques"
   15     delete: false
   16     create: false
   17     files:
   18       - label: "Page d'accueil"
   19         name: "index"
   20         file: "content/pages/index.njk"
   21         fields:
   22           - {label: "Titre SEO", name: "title", widget: "string", hint: "Titre dans Google (max 60 car.)"}
   23           - {label: "Description SEO", name: "description", widget: "text", hint: "Résumé sous le lien Google"}
   24
   25           - label: "Section À propos"
   26             name: "presentation"
   27             widget: "object"
   28             fields:
   29               - {label: "Titre de section", name: "title", widget: "string"}
   30               - {label: "Paragraphe 1", name: "text1", widget: "text"}
   31               - {label: "Paragraphe 2", name: "text2", widget: "text"}
   32               - {label: "Nom du signataire", name: "signature_name", widget: "string"}
   33               - {label: "Poste du signataire", name: "signature_role", widget: "string"}
   34
   35       - label: "Page Nous Soutenir"
   36         name: "soutenir"
   37         file: "content/pages/nous-soutenir.njk"
   38         fields:
   39           - {label: "Titre SEO", name: "title", widget: "string"}
   40           - {label: "Impact Don Ponctuel", name: "impact_p", widget: "string", hint: "Ex: Avec 50€, vous
      financez..."}
   41           - {label: "Impact Don Mensuel", name: "impact_m", widget: "string", hint: "Ex: Avec 10€/mois, vous
      permettez..."}
   42
   43   # 2. GESTION DES FICHES DYNAMIQUES (Études)
   44   - name: "studies"
   45     label: "Catalogue des Études"
   46     folder: "content/studies"
   47     create: true # Permet d'ajouter de nouvelles études
   48     slug: "{{year}}-{{title}}"
   49     fields:
   50       - {label: "Titre de l'étude", name: "title", widget: "string"}
   51       - {label: "Convention", name: "convention", widget: "select", options: ["brs", "minamata", "ccnucc",
      "saicm", "cirgl"]}
   52       - {label: "Année", name: "year", widget: "string"}
   53       - {label: "Auteurs", name: "authors", widget: "string"}
   54       - {label: "Statut", name: "status", widget: "select", options: [{label: "Publié", value: "published"},
      {label: "En cours", value: "progress"}]}
   55       - {label: "Résumé court", name: "desc", widget: "text"}
   56       - {label: "Fichier PDF", name: "pdf", widget: "file", required: false}
   57
   58   # 3. GESTION DES ACTIONS ET TÉMOIGNAGES
   59   - name: "actions"
   60     label: "Actions & Témoignages"
   61     folder: "content/actions"
   62     create: true
   63     slug: "{{type}}-{{title}}"
   64     fields:
   65       - {label: "Titre", name: "title", widget: "string"}
   66       - {label: "Catégorie", name: "type", widget: "select", options: ["action", "campagne", "temoignage"]}
   67       - {label: "Date", name: "date", widget: "string", required: false}
   68       - {label: "Lieu", name: "location", widget: "string", required: false}
   69       - {label: "Image", name: "image", widget: "image", required: false}
   70       - {label: "Résultat / Impact", name: "impact", widget: "string", required: false}
   71       - {label: "Nom (si témoignage)", name: "author", widget: "string", required: false}
   72       - {label: "Contenu / Récit", name: "body", widget: "markdown"}
   73
   74   # 4. GESTION DES PAGES JURIDIQUES
   75   - name: "legal"
   76     label: "Pages Légales"
   77     folder: "content/pages"
   78     filter: {field: "layout", value: "layouts/legal.njk"}
   79     create: false
   80     delete: false
   81     fields:
   82       - {label: "Titre", name: "title", widget: "string"}
   83       - {label: "Texte de la page", name: "body", widget: "markdown"}
