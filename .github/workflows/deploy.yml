name: Netlify Build & Deploy (Zero Cost)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permet de lancer le déploiement manuellement si besoin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Site with Eleventy
        run: npm run build
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          ELEVENTY_ENV: production

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './_site'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions (Zero Cost Build)"
          enable-pull-request-comment: false
          enable-commit-comment: true
          over-write-all-properties: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
