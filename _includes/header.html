<header role="banner">
    <div class="container">
        <div class="header-content">
            <a href="/" class="logo" aria-label="AED Congo - Accueil">
                <div class="logo-image">
                    <img src="/images/logo.jpg" alt="Logo AED Congo" loading="eager" fetchpriority="high"
                         onerror="this.style.display='none';this.parentElement.querySelector('.logo-fb').style.display='flex'">
                    <div class="logo-fb">AED</div>
                </div>
                <div class="logo-text">
                    <strong class="logo-brand">AED Congo</strong>
                    <p>Action Environnement &amp; Développement</p>
                </div>
            </a>
            <button class="hamburger" id="hamburger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="navMain">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-main" id="navMain" role="navigation" aria-label="Navigation principale">
                <ul>
                    <li><a href="/" {% if page.url == '/' %}aria-current="page"{% endif %}>Accueil</a></li>
                    <li><a href="/actions/" {% if page.url == '/actions/' %}aria-current="page"{% endif %}>Nos Actions</a></li>
                    <li><a href="/etudes/" {% if page.url == '/etudes/' %}aria-current="page"{% endif %}>Nos Études</a></li>
                    <li><a href="/nous-soutenir/" {% if page.url == '/nous-soutenir/' %}aria-current="page"{% endif %}>Nous Soutenir</a></li>
                </ul>
            </nav>
            <div class="header-lang">
                <a href="/" class="lang-link active" aria-label="Version française">FR</a>
                <span class="lang-sep">|</span>
                <a href="/en/" class="lang-link" aria-label="English version">EN</a>
            </div>
            <div class="header-social">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" title="Facebook" aria-label="Facebook">
